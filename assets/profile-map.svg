  <text x="60" y="94" fill="#CBD5E1" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="500">The profile is strongest when it reflects the full operating range, not only the functional title.</text>

  <rect x="60" y="132" width="270" height="152" rx="20" fill="#13263F" stroke="#204B78"/>
