  <rect x="660" y="132" width="270" height="152" rx="20" fill="#13263F" stroke="#204B78"/>
  <rect x="960" y="132" width="260" height="152" rx="20" fill="#13263F" stroke="#204B78"/>

  <text x="84" y="168" fill="#D7A94B" font-family="Segoe UI, Arial, sans-serif" font-size="20" font-weight="700">ERP Delivery</text>
  <text x="84" y="198" fill="#E2E8F0" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="500">Implementations, fit-gap,</text>
